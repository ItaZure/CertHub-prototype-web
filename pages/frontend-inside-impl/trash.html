<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>回收站 - W-CaaS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 14px; color: rgba(0,0,0,0.85); background: #f5fafc; display: flex; min-height: 100vh; }

    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: #fff; display: flex; flex-direction: column; border-right: 1px solid #f0f0f0; z-index: 100; }
    .sidebar-back { height: 40px; display: flex; align-items: center; gap: 8px; padding: 8px 16px 8px 12px; font-size: 16px; font-weight: 500; color: rgba(0,0,0,0.85); cursor: pointer; transition: color 0.2s; }
    .sidebar-back:hover { color: #1890ff; }
    .sidebar-back svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-menu { flex: 1; padding: 12px 0 0; overflow-y: auto; }
    .menu-item { display: flex; align-items: center; gap: 10px; padding: 0 16px 0 24px; height: 40px; cursor: pointer; color: rgba(0,0,0,0.85); font-size: 14px; transition: all 0.2s; }
    .menu-item:hover { background: #e6f7ff; color: #1890ff; }
    .menu-item.active { background: #e6f7ff; color: #1890ff; font-weight: 500; }
    .menu-item svg { flex-shrink: 0; width: 16px; height: 16px; }
    .sidebar-footer { padding: 16px 24px; border-top: 1px solid #f0f0f0; }
    .btn-archive { display: flex; align-items: center; gap: 8px; font-size: 14px; color: rgba(0,0,0,0.65); cursor: pointer; transition: color 0.2s; }
    .btn-archive:hover { color: #fa8c16; }

    .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .top-bar { height: 48px; background: #fff; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; position: sticky; top: 0; z-index: 50; }
    .project-title { display: flex; align-items: center; gap: 8px; }
    .project-name { font-size: 15px; font-weight: 600; color: rgba(0,0,0,0.85); }
    .ant-tag { display: inline-flex; align-items: center; height: 22px; padding: 0 8px; border-radius: 4px; font-size: 12px; background: #f0f5ff; color: #2f54eb; border: 1px solid #adc6ff; }
    .top-bar-right { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: #1890ff; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; }

    .page-content { flex: 1; padding: 20px 24px; display: flex; flex-direction: column; }

    .doc-wrap { flex: 1; display: flex; flex-direction: column; }

    .search-wrap { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; }
    .search-input-wrap { position: relative; width: 320px; }
    .search-input-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #bfbfbf; width: 14px; height: 14px; pointer-events: none; }
    .search-input-wrap input { width: 100%; height: 32px; border: 1px solid #d9d9d9; border-radius: 6px; padding: 0 32px; font-size: 14px; outline: none; }
    .search-input-wrap input:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }
    .btn-wrap { display: flex; align-items: center; gap: 8px; }
    .selected-hint { font-size: 13px; color: rgba(0,0,0,0.45); }

    .btn { display: inline-flex; align-items: center; gap: 4px; height: 32px; padding: 0 15px; border-radius: 6px; font-size: 14px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
    .btn-primary { background: #1890ff; color: #fff; border-color: #1890ff; }
    .btn-primary:hover { background: #40a9ff; border-color: #40a9ff; }
    .btn-primary:disabled { background: #8bc7ff; border-color: #8bc7ff; cursor: not-allowed; }

    .table-wrap { flex: 1; background: #fff; border-radius: 8px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { background: #fafafa; padding: 12px 16px; text-align: left; font-weight: 500; color: rgba(0,0,0,0.85); border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
    tbody td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafafa; }
    input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #1890ff; }

    .days-warn { color: #fa8c16; }
    .days-danger { color: #ff4d4f; }

    .pagination { display: flex; justify-content: flex-end; align-items: center; gap: 8px; padding: 16px; background: #fff; border-top: 1px solid #f0f0f0; }
    .page-btn { width: 32px; height: 32px; border: 1px solid #d9d9d9; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #fff; font-size: 13px; }
    .page-btn:hover, .page-btn.active { border-color: #1890ff; color: #1890ff; }
    .page-info { font-size: 13px; color: rgba(0,0,0,0.45); }

    .empty-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; border-radius: 8px; padding: 60px 0; }
    .empty-wrapper svg { width: 80px; height: 80px; opacity: 0.25; margin-bottom: 12px; }
    .empty-text { color: rgba(0,0,0,0.45); font-size: 14px; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 8px; width: 416px; box-shadow: 0 6px 24px rgba(0,0,0,0.2); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #f0f0f0; font-size: 16px; font-weight: 500; }
    .modal-close { cursor: pointer; color: rgba(0,0,0,0.45); font-size: 18px; }
    .modal-close:hover { color: rgba(0,0,0,0.85); }
    .modal-body { padding: 24px; font-size: 14px; color: rgba(0,0,0,0.85); line-height: 1.6; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 24px; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-back" onclick="location.href='../frontend-outside-cn/projects.html'">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3L5 8l5 5"/></svg>
    返回项目列表
  </div>
  <nav class="sidebar-menu">
    <div class="menu-item" onclick="location.href='project-overview.html'">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 6h6M5 9h4"/></svg>
      项目信息
    </div>
    <div class="menu-item" onclick="location.href='doc-list.html'">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2h7l3 3v9H3z"/><path d="M10 2v3h3"/><path d="M5 7h6M5 10h4"/></svg>
      认证实施
    </div>
    <div class="menu-item active">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3h10v2H3zM5 7l-2 6h10L11 7z"/><path d="M6 9.5h4"/></svg>
      回收站
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="btn-archive">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12v1.5L8 9 2 5.5z"/><path d="M2 5.5v7h12v-7"/></svg>
      归档项目
    </div>
  </div>
</aside>

<div class="main">
  <div class="top-bar">
    <div class="project-title">
      <span class="project-name">UI测试</span>
      <span class="ant-tag">评估保障级（EAL）-2024</span>
      <span class="ant-tag">EAL4</span>
    </div>
    <div class="top-bar-right">
      <div class="user-avatar">章</div>
    </div>
  </div>

  <div class="page-content">
    <div class="doc-wrap">
      <div class="search-wrap">
        <div class="search-input-wrap">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.742 10.344a6.5 6.5 0 10-1.397 1.398l3.85 3.85a1 1 0 001.415-1.414l-3.868-3.834zm-5.242 1.156a5 5 0 110-10 5 5 0 010 10z"/></svg>
          <input type="text" id="searchInput" placeholder="按文档名称搜索" oninput="handleSearch()" />
        </div>
        <div class="btn-wrap">
          <span class="selected-hint" id="selectedHint" style="display:none"></span>
          <button class="btn btn-primary" id="recoverBtn" disabled onclick="openRecoverModal()">
            ↺ 还原文档
          </button>
        </div>
      </div>

      <div class="table-wrap" id="tableWrap">
        <table>
          <thead>
            <tr>
              <th style="width:40px"><input type="checkbox" id="checkAll" onchange="toggleAll(this)" /></th>
              <th>文档名称</th>
              <th style="width:180px">删除时间</th>
              <th style="width:120px">剩余天数</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div class="pagination">
          <span class="page-info" id="pageInfo"></span>
          <div class="page-btn" onclick="changePage(-1)">‹</div>
          <div class="page-btn active" id="pageNum">1</div>
          <div class="page-btn" onclick="changePage(1)">›</div>
        </div>
      </div>

      <div class="empty-wrapper" id="emptyWrap" style="display:none">
        <svg viewBox="0 0 100 100" fill="currentColor"><path d="M20 30h60v5H20zm5 10h50v40H25zm15 10v20h20V50z" opacity=".4"/></svg>
        <div class="empty-text" id="emptyText">回收站内无文档</div>
      </div>
    </div>
  </div>
</div>

<!-- 还原确认弹窗 -->
<div class="modal-overlay" id="recoverModal">
  <div class="modal">
    <div class="modal-header">
      <span>还原文档</span>
      <span class="modal-close" onclick="closeModal('recoverModal')">×</span>
    </div>
    <div class="modal-body" id="recoverModalBody"></div>
    <div class="modal-footer">
      <button class="btn" style="border:1px solid #d9d9d9;background:#fff" onclick="closeModal('recoverModal')">取消</button>
      <button class="btn btn-primary" onclick="confirmRecover()">确定</button>
    </div>
  </div>
</div>

<script>
  const mockData = [
    { id: 1, docName: '安全目标文档 ST-v1.2', deletedAt: '2026-04-10 14:23', days: 20 },
    { id: 2, docName: '设计文档 TDS-模块A', deletedAt: '2026-04-08 09:11', days: 18 },
    { id: 3, docName: '测试报告 ATE-功能测试', deletedAt: '2026-04-05 16:45', days: 15 },
    { id: 4, docName: '配置管理文档 ACM-v2', deletedAt: '2026-03-28 11:30', days: 7 },
    { id: 5, docName: '脆弱性分析报告 AVA', deletedAt: '2026-03-25 08:00', days: 4 },
  ];

  let filtered = [...mockData];
  let selected = [];
  let currentPage = 1;
  const pageSize = 10;

  function render() {
    const start = (currentPage - 1) * pageSize;
    const rows = filtered.slice(start, start + pageSize);
    const tbody = document.getElementById('tableBody');
    const tableWrap = document.getElementById('tableWrap');
    const emptyWrap = document.getElementById('emptyWrap');

    if (filtered.length === 0) {
      tableWrap.style.display = 'none';
      emptyWrap.style.display = 'flex';
      document.getElementById('emptyText').textContent =
        document.getElementById('searchInput').value ? '未找到相关结果' : '回收站内无文档';
      return;
    }
    tableWrap.style.display = 'block';
    emptyWrap.style.display = 'none';

    tbody.innerHTML = rows.map(r => {
      const daysClass = r.days <= 5 ? 'days-danger' : r.days <= 10 ? 'days-warn' : '';
      const checked = selected.includes(r.id) ? 'checked' : '';
      return `<tr>
        <td><input type="checkbox" ${checked} onchange="toggleRow(${r.id}, this)" /></td>
        <td>${r.docName}</td>
        <td>${r.deletedAt}</td>
        <td class="${daysClass}">${r.days}天</td>
      </tr>`;
    }).join('');

    document.getElementById('pageInfo').textContent = `共 ${filtered.length} 条`;
    document.getElementById('pageNum').textContent = currentPage;
    updateCheckAll();
    updateRecoverBtn();
  }

  function handleSearch() {
    const kw = document.getElementById('searchInput').value.trim().toLowerCase();
    filtered = kw ? mockData.filter(d => d.docName.toLowerCase().includes(kw)) : [...mockData];
    selected = [];
    currentPage = 1;
    render();
  }

  function toggleAll(cb) {
    const start = (currentPage - 1) * pageSize;
    const pageIds = filtered.slice(start, start + pageSize).map(r => r.id);
    if (cb.checked) {
      pageIds.forEach(id => { if (!selected.includes(id)) selected.push(id); });
    } else {
      selected = selected.filter(id => !pageIds.includes(id));
    }
    render();
  }

  function toggleRow(id, cb) {
    if (cb.checked) { if (!selected.includes(id)) selected.push(id); }
    else { selected = selected.filter(i => i !== id); }
    updateCheckAll();
    updateRecoverBtn();
  }

  function updateCheckAll() {
    const start = (currentPage - 1) * pageSize;
    const pageIds = filtered.slice(start, start + pageSize).map(r => r.id);
    const allChecked = pageIds.length > 0 && pageIds.every(id => selected.includes(id));
    document.getElementById('checkAll').checked = allChecked;
  }

  function updateRecoverBtn() {
    const btn = document.getElementById('recoverBtn');
    const hint = document.getElementById('selectedHint');
    btn.disabled = selected.length === 0;
    if (selected.length > 0) {
      hint.style.display = 'inline';
      hint.textContent = `已选${selected.length}项`;
    } else {
      hint.style.display = 'none';
    }
  }

  function changePage(dir) {
    const total = Math.ceil(filtered.length / pageSize);
    currentPage = Math.max(1, Math.min(total, currentPage + dir));
    render();
  }

  function openRecoverModal() {
    if (selected.length === 0) return;
    const first = mockData.find(d => d.id === selected[0]);
    const extra = selected.length > 1 ? `等${selected.length}个文档` : '';
    document.getElementById('recoverModalBody').textContent =
      `确定将"${first.docName}"${extra}从回收站还原？`;
    document.getElementById('recoverModal').classList.add('open');
  }

  function confirmRecover() {
    filtered = filtered.filter(d => !selected.includes(d.id));
    selected = [];
    closeModal('recoverModal');
    render();
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
  }

  render();
</script>
</body>
</html>
