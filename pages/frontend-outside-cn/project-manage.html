<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目管理 - CertHub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "PingFang SC","Microsoft YaHei",sans-serif; font-size: 14px; color: rgba(0,0,0,0.85); background: #f0f2f5; height: 100vh; overflow: hidden; display: flex; }

    .sidebar { width: 200px; flex-shrink: 0; background: #fff; height: 100vh; display: flex; flex-direction: column; border-right: 1px solid #f0f0f0; }
    .sidebar-logo { height: 50px; display: flex; align-items: center; padding: 0 24px; border-bottom: 1px solid #f0f0f0; }
    .sidebar-logo img { height: 28px; }
    .sidebar-menu { padding: 12px 0 0; flex: 1; overflow-y: auto; }
    .menu-item { display: flex; align-items: center; gap: 8px; height: 40px; padding: 0 16px 0 24px; border-radius: 8px; margin: 0 5px 4px; cursor: pointer; color: rgba(0,0,0,0.65); font-size: 14px; transition: all 0.2s; white-space: nowrap; }
    .menu-item:hover { background: #f5f5f5; color: rgba(0,0,0,0.85); }
    .menu-item.active { background: #e6f7ff; color: #1890ff; }
    .menu-item svg { flex-shrink: 0; }

    .main-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .header { height: 50px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; }
    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 14px; }
    .breadcrumb-item { color: #999; }
    .breadcrumb-item.current { color: rgba(0,0,0,0.85); }
    .breadcrumb-sep { color: #999; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: #1890ff; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; }

    .content { flex: 1; overflow-y: auto; padding: 20px 24px; }

    /* Search */
    .search-wrap { background: #fff; border-radius: 8px; padding: 20px 24px 8px; margin-bottom: 16px; }
    .filter-row { display: flex; gap: 0; margin-bottom: 16px; }
    .filter-col { flex: 1; display: flex; align-items: center; }
    .filter-col label { width: 100px; flex-shrink: 0; text-align: right; padding-right: 8px; color: rgba(0,0,0,0.85); line-height: 32px; }
    .filter-col input, .filter-col select { flex: 1; height: 32px; border: 1px solid #d9d9d9; border-radius: 6px; padding: 0 11px; font-size: 14px; outline: none; background: #fff; min-width: 0; }
    .filter-col input:focus, .filter-col select:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }
    .date-range { display: flex; align-items: center; gap: 4px; flex: 1; }
    .date-range input { flex: 1; min-width: 0; }
    .date-sep { color: rgba(0,0,0,0.45); flex-shrink: 0; }
    .btn-col { flex: 1; display: flex; justify-content: flex-end; align-items: center; gap: 8px; padding-right: 0; }

    /* Content */
    .content-container { background: #fff; border-radius: 8px; padding: 16px 24px; }
    .header-wrap { margin-bottom: 16px; }

    .btn { display: inline-flex; align-items: center; gap: 4px; height: 32px; padding: 0 15px; border-radius: 6px; font-size: 14px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
    .btn-primary { background: #1890ff; color: #fff; border-color: #1890ff; }
    .btn-primary:hover { background: #40a9ff; border-color: #40a9ff; }
    .btn-default { background: #fff; color: rgba(0,0,0,0.85); border-color: #d9d9d9; }
    .btn-default:hover { color: #1890ff; border-color: #1890ff; }
    .btn-ghost { background: transparent; color: #1890ff; border-color: #1890ff; }
    .btn-ghost:hover { background: #e6f7ff; }

    table { width: 100%; border-collapse: collapse; }
    thead th { background: #fafafa; padding: 12px 16px; text-align: left; font-weight: 500; color: rgba(0,0,0,0.85); border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
    tbody td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafafa; }

    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .status-active { background: #1890ff; }
    .status-archived { background: #52c41a; }

    .action-link { color: #1890ff; cursor: pointer; margin-right: 8px; }
    .action-link:hover { color: #40a9ff; }
    .action-link.danger { color: #ff4d4f; }
    .action-link.danger:hover { color: #ff7875; }

    .pagination { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 16px; }
    .page-btn { width: 32px; height: 32px; border: 1px solid #d9d9d9; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #fff; font-size: 13px; }
    .page-btn:hover, .page-btn.active { border-color: #1890ff; color: #1890ff; }
    .page-info { font-size: 13px; color: rgba(0,0,0,0.45); }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 8px; width: 520px; box-shadow: 0 6px 24px rgba(0,0,0,0.2); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #f0f0f0; font-size: 16px; font-weight: 500; }
    .modal-close { cursor: pointer; color: rgba(0,0,0,0.45); font-size: 18px; line-height: 1; }
    .modal-close:hover { color: rgba(0,0,0,0.85); }
    .modal-body { padding: 24px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 24px; border-top: 1px solid #f0f0f0; }
    .form-row { display: flex; align-items: center; margin-bottom: 20px; }
    .form-label { width: 100px; flex-shrink: 0; text-align: right; padding-right: 8px; color: rgba(0,0,0,0.85); }
    .form-label.required::before { content: '*'; color: #f5222d; margin-right: 4px; }
    .form-field { flex: 1; }
    .form-field input, .form-field select { width: 100%; height: 32px; border: 1px solid #d9d9d9; border-radius: 6px; padding: 0 11px; font-size: 14px; outline: none; background: #fff; }
    .form-field input:focus, .form-field select:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }
    .form-err { color: #ff4d4f; font-size: 12px; margin-top: 4px; min-height: 18px; }

    .del-modal-content { color: rgba(0,0,0,0.45); margin: 8px 0 24px; display: block; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="https://wcaas.wonsec.com/wcaas/static/png/logo_small-86cf36e4.png" alt="logo" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span style="display:none;font-weight:700;color:#1890ff;font-size:16px;">W-CaaS</span>
    </div>
    <nav class="sidebar-menu">
      <div class="menu-item" onclick="location.href='projects.html'">
        <svg width="16" height="16" viewBox="0 0 1024 1024" fill="currentColor"><path d="M928 160H96c-17.7 0-32 14.3-32 32v640c0 17.7 14.3 32 32 32h832c17.7 0 32-14.3 32-32V192c0-17.7-14.3-32-32-32zM338 304h348c8.8 0 16 7.2 16 16v48c0 8.8-7.2 16-16 16H338c-8.8 0-16-7.2-16-16v-48c0-8.8 7.2-16 16-16zm0 160h348c8.8 0 16 7.2 16 16v48c0 8.8-7.2 16-16 16H338c-8.8 0-16-7.2-16-16v-48c0-8.8 7.2-16 16-16zm0 160h220c8.8 0 16 7.2 16 16v48c0 8.8-7.2 16-16 16H338c-8.8 0-16-7.2-16-16v-48c0-8.8 7.2-16 16-16zM256 304a48 48 0 100 96 48 48 0 000-96zm0 160a48 48 0 100 96 48 48 0 000-96zm0 160a48 48 0 100 96 48 48 0 000-96z"/></svg>
        <span>我的项目</span>
      </div>
      <div class="menu-item" onclick="location.href='members.html'">
        <svg width="16" height="16" viewBox="0 0 1024 1024" fill="currentColor"><path d="M824 708H200c-4.4 0-8 3.6-8 8v56c0 4.4 3.6 8 8 8h624c4.4 0 8-3.6 8-8v-56c0-4.4-3.6-8-8-8zm0-192H200c-4.4 0-8 3.6-8 8v56c0 4.4 3.6 8 8 8h624c4.4 0 8-3.6 8-8v-56c0-4.4-3.6-8-8-8zm0-192H200c-4.4 0-8 3.6-8 8v56c0 4.4 3.6 8 8 8h624c4.4 0 8-3.6 8-8v-56c0-4.4-3.6-8-8-8z"/></svg>
        <span>组织成员</span>
      </div>
      <div class="menu-item active">
        <svg width="16" height="16" viewBox="0 0 1024 1024" fill="currentColor"><path d="M512 64C264.6 64 64 264.6 64 512s200.6 448 448 448 448-200.6 448-448S759.4 64 512 64zm0 820c-205.4 0-372-166.6-372-372s166.6-372 372-372 372 166.6 372 372-166.6 372-372 372zm5.6-532.7c53 0 96.1 43.1 96.1 96.1 0 53-43.1 96.1-96.1 96.1-53 0-96.1-43.1-96.1-96.1 0-53 43.2-96.1 96.1-96.1m0-72c-92.9 0-168.1 75.3-168.1 168.1 0 92.9 75.3 168.1 168.1 168.1 92.9 0 168.1-75.3 168.1-168.1 0-92.9-75.2-168.1-168.1-168.1zm-.6 394.1c-105.6 0-196.5 50-254 127.1-9.2 12.3-6.6 29.8 5.7 39 12.3 9.2 29.8 6.6 39-5.7C352 758.5 429.5 716 517 716s165 42.5 210.2 107.8c9.2 12.3 26.7 14.9 39 5.7 12.3-9.2 14.9-26.7 5.7-39C714.5 713.4 623.6 673.4 517 673.4z"/></svg>
        <span>项目管理</span>
      </div>
    </nav>
  </aside>

  <div class="main-wrap">
    <header class="header">
      <nav class="breadcrumb">
        <span class="breadcrumb-item">认证平台</span>
        <span class="breadcrumb-sep">/</span>
        <span class="breadcrumb-item current">项目管理</span>
      </nav>
      <div class="header-right">
        <div class="user-avatar" title="张三">张</div>
      </div>
    </header>

    <div class="content">
      <!-- 搜索筛选 -->
      <div class="search-wrap">
        <div class="filter-row">
          <div class="filter-col">
            <label>项目名称</label>
            <input type="text" placeholder="请输入项目名称" maxlength="100" />
          </div>
          <div class="filter-col">
            <label>认证类型</label>
            <select id="filterCategory" onchange="onCategoryChange(this)">
              <option value="">全部</option>
              <option value="1">CC认证</option>
              <option value="2">等保认证</option>
            </select>
          </div>
          <div class="filter-col">
            <label>项目等级</label>
            <select id="filterLevel" disabled>
              <option value="">全部</option>
              <option value="EAL1">EAL1</option>
              <option value="EAL2">EAL2</option>
              <option value="EAL3">EAL3</option>
              <option value="EAL4">EAL4</option>
            </select>
          </div>
        </div>
        <div class="filter-row">
          <div class="filter-col">
            <label>产品类型</label>
            <select id="filterType" disabled>
              <option value="">全部</option>
              <option value="1">操作系统</option>
              <option value="2">数据库</option>
              <option value="3">网络设备</option>
            </select>
          </div>
          <div class="filter-col">
            <label>项目状态</label>
            <select>
              <option value="">全部</option>
              <option value="0">进行中</option>
              <option value="1">已归档</option>
            </select>
          </div>
          <div class="filter-col">
            <label>项目负责人</label>
            <select>
              <option value="">全部</option>
              <option value="1">张三</option>
              <option value="2">李四</option>
            </select>
          </div>
        </div>
        <div class="filter-row">
          <div class="filter-col">
            <label>项目组员</label>
            <select>
              <option value="">全部</option>
              <option value="1">张三</option>
              <option value="2">王五</option>
            </select>
          </div>
          <div class="filter-col">
            <label>创建日期</label>
            <div class="date-range">
              <input type="date" />
              <span class="date-sep">~</span>
              <input type="date" />
            </div>
          </div>
          <div class="btn-col">
            <button class="btn btn-ghost">筛选</button>
            <button class="btn btn-default">重置</button>
          </div>
        </div>
      </div>

      <!-- 表格 -->
      <div class="content-container">
        <div class="header-wrap">
          <button class="btn btn-primary" onclick="openCreateModal()">+ 创建新项目</button>
        </div>
        <table>
          <thead>
            <tr>
              <th style="width:374px">项目名称</th>
              <th>认证类型</th>
              <th style="width:150px">项目等级</th>
              <th style="width:150px">类型</th>
              <th style="width:120px">项目负责人</th>
              <th style="width:100px">项目状态</th>
              <th style="width:100px">操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>某安全操作系统CC认证项目</td>
              <td>CC认证</td>
              <td>EAL4</td>
              <td>操作系统</td>
              <td>张三</td>
              <td><span class="status-dot status-active"></span>进行中</td>
              <td>
                <span class="action-link" onclick="openEditModal({id:1,name:'某安全操作系统CC认证项目',status:0})">编辑</span>
                <span class="action-link danger" onclick="openDelModal('某安全操作系统CC认证项目')">删除</span>
              </td>
            </tr>
            <tr>
              <td>数据库管理系统安全认证</td>
              <td>CC认证</td>
              <td>EAL2</td>
              <td>数据库</td>
              <td>李四</td>
              <td><span class="status-dot status-active"></span>进行中</td>
              <td>
                <span class="action-link" onclick="openEditModal({id:2,name:'数据库管理系统安全认证',status:0})">编辑</span>
                <span class="action-link danger" onclick="openDelModal('数据库管理系统安全认证')">删除</span>
              </td>
            </tr>
            <tr>
              <td>网络防火墙等保三级认证</td>
              <td>等保认证</td>
              <td>三级</td>
              <td>网络设备</td>
              <td>王五</td>
              <td><span class="status-dot status-archived"></span>已归档</td>
              <td>
                <span class="action-link" onclick="openEditModal({id:3,name:'网络防火墙等保三级认证',status:1})">编辑</span>
                <span class="action-link danger" onclick="openDelModal('网络防火墙等保三级认证')">删除</span>
              </td>
            </tr>
          </tbody>
        </table>
        <div class="pagination">
          <span class="page-info">共 3 条</span>
          <div class="page-btn">‹</div>
          <div class="page-btn active">1</div>
          <div class="page-btn">›</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 创建/编辑弹窗 -->
  <div class="modal-overlay" id="proModal">
    <div class="modal">
      <div class="modal-header">
        <span id="modalTitle">创建新项目</span>
        <span class="modal-close" onclick="closeModal('proModal')">×</span>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label class="form-label required">项目名称</label>
          <div class="form-field">
            <input type="text" id="proName" placeholder="请输入项目名称" maxlength="100" />
            <div class="form-err" id="errProName"></div>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label required">认证类型</label>
          <div class="form-field">
            <select id="proCategoryId">
              <option value="">请选择</option>
              <option value="1">CC认证</option>
              <option value="2">等保认证</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">排版规范</label>
          <div class="form-field">
            <select id="proLayoutId">
              <option value="">请选择</option>
              <option value="1">标准排版</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label required">项目等级</label>
          <div class="form-field">
            <select id="proLevelId">
              <option value="">请选择</option>
              <option value="EAL1">EAL1</option>
              <option value="EAL2">EAL2</option>
              <option value="EAL3">EAL3</option>
              <option value="EAL4">EAL4</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">项目负责人</label>
          <div class="form-field">
            <select id="proOwnerId">
              <option value="">请选择</option>
              <option value="1">张三</option>
              <option value="2">李四</option>
              <option value="3">王五</option>
            </select>
          </div>
        </div>
        <div class="form-row" id="statusRow" style="display:none">
          <label class="form-label">项目状态</label>
          <div class="form-field">
            <select id="proStatus">
              <option value="0">进行中</option>
              <option value="1">已归档</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeModal('proModal')">取消</button>
        <button class="btn btn-primary" onclick="confirmPro()">确定</button>
      </div>
    </div>
  </div>

  <!-- 删除弹窗 -->
  <div class="modal-overlay" id="delModal">
    <div class="modal">
      <div class="modal-header">
        <span>删除项目</span>
        <span class="modal-close" onclick="closeModal('delModal')">×</span>
      </div>
      <div class="modal-body">
        <span class="del-modal-content" id="delModalContent"></span>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeModal('delModal')">取消</button>
        <button class="btn btn-primary" style="background:#ff4d4f;border-color:#ff4d4f" onclick="closeModal('delModal')">确定</button>
      </div>
    </div>
  </div>

  <script>
    function onCategoryChange(sel) {
      document.getElementById('filterLevel').disabled = !sel.value;
      document.getElementById('filterType').disabled = !sel.value;
    }
    function openCreateModal() {
      document.getElementById('modalTitle').textContent = '创建新项目';
      document.getElementById('statusRow').style.display = 'none';
      document.getElementById('proName').value = '';
      document.getElementById('proModal').classList.add('open');
    }
    function openEditModal(record) {
      document.getElementById('modalTitle').textContent = '编辑项目';
      document.getElementById('statusRow').style.display = 'flex';
      document.getElementById('proName').value = record.name;
      document.getElementById('proStatus').value = record.status;
      document.getElementById('proModal').classList.add('open');
    }
    function openDelModal(name) {
      document.getElementById('delModalContent').textContent = `确定要删除项目"${name}"吗？`;
      document.getElementById('delModal').classList.add('open');
    }
    function closeModal(id) {
      document.getElementById(id).classList.remove('open');
    }
    function confirmPro() {
      const name = document.getElementById('proName').value.trim();
      if (!name) {
        document.getElementById('errProName').textContent = '请输入项目名称';
        return;
      }
      document.getElementById('errProName').textContent = '';
      closeModal('proModal');
    }
    document.querySelectorAll('.modal-overlay').forEach(el => {
      el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
    });
  </script>
</body>
</html>
