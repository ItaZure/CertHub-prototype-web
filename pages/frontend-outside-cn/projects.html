<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>W-CaaS - 我的项目</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "PingFang SC", "Source Han Sans", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      color: rgba(0,0,0,0.85);
      background: #f0f2f5;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ── 侧边栏 ── */
    .sidebar {
      width: 200px;
      flex-shrink: 0;
      background: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #f0f0f0;
    }

    .sidebar-logo {
      height: 50px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      border-bottom: 1px solid #f0f0f0;
    }

    .sidebar-logo img {
      height: 28px;
    }

    .sidebar-menu {
      padding: 12px 0 0;
      flex: 1;
      overflow-y: auto;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 0 16px 0 24px;
      border-radius: 8px;
      margin: 0 5px 4px;
      cursor: pointer;
      color: rgba(0,0,0,0.65);
      font-size: 14px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .menu-item:hover { background: #f5f5f5; color: rgba(0,0,0,0.85); }

    .menu-item.active {
      background: #e6f7ff;
      color: #1890ff;
    }

    .menu-item svg { flex-shrink: 0; }

    /* ── 右侧主区域 ── */
    .main-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 顶部 Header ── */
    .header {
      height: 50px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid #f0f0f0;
      flex-shrink: 0;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
    }

    .breadcrumb-item { color: #999; }
    .breadcrumb-item.current { color: rgba(0,0,0,0.85); }
    .breadcrumb-sep { color: #999; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .bell-wrap {
      position: relative;
      cursor: pointer;
    }

    .bell-badge {
      position: absolute;
      top: -6px;
      right: -8px;
      background: #ff4d4f;
      color: #fff;
      font-size: 10px;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      line-height: 1;
    }

    .notif-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 12px);
      right: -8px;
      width: 320px;
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
      z-index: 100;
      overflow: hidden;
    }
    .notif-dropdown.open { display: block; }

    .notif-dropdown::before {
      content: '';
      position: absolute;
      top: -6px;
      right: 16px;
      border: 6px solid transparent;
      border-bottom-color: #fff;
      border-top: none;
      filter: drop-shadow(0 -2px 2px rgba(0,0,0,0.06));
    }

    .notif-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
      font-weight: 500;
      color: rgba(0,0,0,0.85);
    }
    .notif-header a {
      font-size: 12px;
      font-weight: 400;
      color: #1890ff;
      text-decoration: none;
      cursor: pointer;
    }
    .notif-header a:hover { color: #40a9ff; }

    .notif-list { max-height: 320px; overflow-y: auto; }

    .notif-item {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .notif-item:last-child { border-bottom: none; }
    .notif-item:hover { background: #f5f5f5; }

    .notif-dot {
      flex-shrink: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #1890ff;
      margin-top: 5px;
    }
    .notif-dot.read { background: transparent; }

    .notif-body { flex: 1; min-width: 0; }
    .notif-title {
      font-size: 13px;
      color: rgba(0,0,0,0.85);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .notif-item.read .notif-title { color: rgba(0,0,0,0.45); }
    .notif-time {
      font-size: 12px;
      color: rgba(0,0,0,0.35);
      margin-top: 2px;
    }

    .notif-footer {
      padding: 10px 16px;
      text-align: center;
      border-top: 1px solid #f0f0f0;
      font-size: 13px;
      color: #1890ff;
      cursor: pointer;
    }
    .notif-footer:hover { background: #f5f5f5; }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1890ff;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      cursor: pointer;
    }

    .user-dropdown-wrap {
      position: relative;
    }
    .user-dropdown {
      display: none;
      position: absolute;
      top: 36px;
      right: 0;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
      min-width: 160px;
      z-index: 999;
      overflow: hidden;
    }
    .user-dropdown.open { display: block; }
    .user-dropdown-info {
      padding: 12px 16px 8px;
      border-bottom: 1px solid #f0f0f0;
    }
    .user-dropdown-name { font-size: 15px; font-weight: 500; color: #333; margin-bottom: 2px; }
    .user-dropdown-org { font-size: 13px; color: #999; }
    .user-dropdown-item {
      display: block;
      padding: 10px 16px;
      font-size: 14px;
      color: rgba(0,0,0,0.85);
      cursor: pointer;
      transition: background 0.15s;
    }
    .user-dropdown-item:hover { background: #f5f5f5; }
    .user-dropdown-item.danger { color: #ff4d4f; }

    .privacy-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: rgba(0,0,0,0.45);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .privacy-toggle:hover { background: #f5f5f5; color: rgba(0,0,0,0.65); }
    .privacy-toggle.active { color: #1890ff; }
    .privacy-toggle svg { flex-shrink: 0; }

    /* 隐私模式：模糊项目名称 */
    body.privacy-mode .pro-name {
      filter: blur(6px);
      transition: filter 0.2s;
      cursor: pointer;
    }
    body.privacy-mode .pro-wrap:hover .pro-name {
      filter: blur(0);
    }

    /* ── 内容区 ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      background: #f0f2f5;
    }

    /* ── 筛选栏 ── */
    .search-wrap {
      background: #fff;
      border-radius: 8px;
      padding: 20px 24px 8px;
      margin-bottom: 16px;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0 12px;
      margin-bottom: 12px;
    }

    .filter-item {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 calc(25% - 9px);
      min-width: 200px;
      margin-bottom: 12px;
    }

    .filter-label {
      font-size: 14px;
      color: rgba(0,0,0,0.85);
      white-space: nowrap;
      width: 56px;
      text-align: right;
      flex-shrink: 0;
    }

    .filter-label::after { content: " :"; }

    .filter-input, .filter-select {
      flex: 1;
      height: 32px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      padding: 0 10px;
      font-size: 14px;
      color: rgba(0,0,0,0.85);
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }

    .filter-input:focus, .filter-select:focus {
      border-color: #40a9ff;
      box-shadow: 0 0 0 2px rgba(24,144,255,0.2);
    }

    .filter-input::placeholder { color: rgba(0,0,0,0.25); }

    .filter-select:disabled { background: #f5f5f5; cursor: not-allowed; color: rgba(0,0,0,0.25); }

    .select-wrap {
      flex: 1;
      position: relative;
    }

    .select-wrap select {
      width: 100%;
    }

    .select-wrap[data-tip]::before {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 12px;
      white-space: nowrap;
      padding: 4px 8px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }
    .select-wrap[data-tip]::after {
      content: '';
      position: absolute;
      bottom: calc(100% + 3px);
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: rgba(0,0,0,0.75);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }
    .select-wrap[data-tip]:hover::before,
    .select-wrap[data-tip]:hover::after {
      opacity: 1;
    }

    .select-wrap::after {
      content: '';
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      border: 4px solid transparent;
      border-top-color: rgba(0,0,0,0.25);
      pointer-events: none;
    }

    .date-range {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 4px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      padding: 0 10px;
      background: #fff;
      height: 32px;
      transition: border-color 0.2s;
    }

    .date-range:focus-within { border-color: #40a9ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }

    .date-range input {
      border: none;
      outline: none;
      font-size: 13px;
      color: rgba(0,0,0,0.85);
      width: 90px;
      background: transparent;
    }

    .date-range input::placeholder { color: rgba(0,0,0,0.25); font-size: 12px; }

    .date-sep { color: rgba(0,0,0,0.25); font-size: 18px; flex-shrink: 0; }

    .filter-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      padding-bottom: 12px;
    }

    .btn {
      height: 32px;
      padding: 0 16px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
      border: 1px solid transparent;
    }

    .btn-primary { background: #1890ff; color: #fff; border-color: #1890ff; }
    .btn-primary:hover { background: #40a9ff; border-color: #40a9ff; }

    .btn-default { background: #fff; color: rgba(0,0,0,0.85); border-color: #d9d9d9; }
    .btn-default:hover { color: #1890ff; border-color: #1890ff; }

    /* ── 项目列表 ── */
    .project-section {
      background: #fff;
      border-radius: 8px;
      padding: 0 24px 20px;
    }

    /* ── Tabs ── */
    .tabs-bar {
      display: flex;
      align-items: center;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 20px;
      position: relative;
    }

    .tab-item {
      padding: 14px 16px;
      font-size: 14px;
      color: rgba(0,0,0,0.45);
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      white-space: nowrap;
    }

    .tab-item.active { color: #1890ff; font-weight: 500; }

    .tab-item.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0; right: 0;
      height: 2px;
      background: #1890ff;
      border-radius: 2px;
    }

    /* ── 项目卡片网格 ── */
    .pro-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
    }

    .pro-wrap {
      width: 100%;
      height: 158px;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 16px 24px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fff;
    }

    .pro-wrap:hover {
      border-color: #1890ff;
      box-shadow: 0 2px 12px rgba(24,144,255,0.12);
    }

    .pro-name {
      font-size: 14px;
      font-weight: 700;
      color: rgba(0,0,0,0.85);
      line-height: 1.5;
      /* clamp to 2 lines */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .pro-label {
      font-size: 12px;
      color: rgba(0,0,0,0.45);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pro-foot {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: auto;
    }

    .tag {
      display: inline-block;
      background: #f4f6f7;
      color: #0050b3;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      padding: 1px 12px;
      white-space: nowrap;
    }

    .create-time {
      font-size: 12px;
      color: rgba(0,0,0,0.25);
      margin-top: 2px;
    }

    /* ── 分页 ── */
    .pagination {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      justify-content: flex-end;
    }

    .pagination-info {
      font-size: 14px;
      color: rgba(0,0,0,0.65);
      margin-right: 8px;
    }

    .page-btn {
      width: 32px;
      height: 32px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: rgba(0,0,0,0.65);
      transition: all 0.2s;
    }

    .page-btn:hover:not(:disabled) { border-color: #1890ff; color: #1890ff; }
    .page-btn:disabled { cursor: not-allowed; color: rgba(0,0,0,0.25); background: #f5f5f5; }
    .page-btn.active { background: #1890ff; border-color: #1890ff; color: #fff; }
  </style>
</head>

          <div class="filter-item">
            <span class="filter-label">项目等级</span>
            <div class="select-wrap" id="wrapLevel" data-tip="请先选择认证类型">
              <select class="filter-select" id="filterLevel" disabled>
                <option value="">请选择</option>
              </select>
            </div>
          </div>
          <div class="filter-item">
            <span class="filter-label">产品类型</span>
            <div class="select-wrap" id="wrapProductType" data-tip="请先选择认证类型">
              <select class="filter-select" id="filterProductType" disabled>
                <option value="">请选择</option>
              </select>
            </div>
          </div>
          <div class="filter-item" style="flex:0 0 calc(50% - 6px); min-width:320px;">
            <span class="filter-label">创建日期</span>
            <div class="date-range">
              <input type="text" placeholder="开始日期" id="dateStart" />
              <span class="date-sep">→</span>
              <input type="text" placeholder="结束日期" id="dateEnd" />
              <svg width="14" height="14" viewBox="64 64 896 896" fill="rgba(0,0,0,0.25)" style="flex-shrink:0;margin-left:4px"><path d="M880 184H712v-64c0-4.4-3.6-8-8-8h-56c-4.4 0-8 3.6-8 8v64H384v-64c0-4.4-3.6-8-8-8h-56c-4.4 0-8 3.6-8 8v64H144c-17.7 0-32 14.3-32 32v664c0 17.7 14.3 32 32 32h736c17.7 0 32-14.3 32-32V216c0-17.7-14.3-32-32-32zm-40 656H184V460h656v380zm0-448H184V256h128v48c0 4.4 3.6 8 8 8h56c4.4 0 8-3.6 8-8v-48h256v48c0 4.4 3.6 8 8 8h56c4.4 0 8-3.6 8-8v-48h128v136z"/></svg>
            </div>
          </div>
          <div class="filter-actions">
            <button class="btn btn-primary" onclick="applyFilter()">筛 选</button>
            <button class="btn btn-default" onclick="resetFilter()">重 置</button>
          </div>
        </div>
      </div>

      <!-- 项目列表 -->
      <div class="project-section">
        <div class="tabs-bar">
          <div class="tab-item active" data-tab="underway" onclick="switchTab(this)">进行中的项目</div>
          <div class="tab-item" data-tab="archived" onclick="switchTab(this)">已归档的项目</div>
          <div class="privacy-toggle" id="privacyToggle" title="开启后项目名称将模糊显示，hover 可临时查看" style="margin-left:auto;margin-bottom:1px;">
            <svg width="14" height="14" viewBox="64 64 896 896" fill="currentColor"><path d="M942.2 486.2C847.4 286.5 704.1 186 512 186c-192.2 0-335.4 100.5-430.2 300.3a60.3 60.3 0 000 51.5C176.6 737.5 319.9 838 512 838c192.2 0 335.4-100.5 430.2-300.3 7.7-16.2 7.7-35 0-51.5zM512 766c-161.3 0-279.4-81.8-362.7-254C232.6 339.8 350.7 258 512 258c161.3 0 279.4 81.8 362.7 254C791.4 684.2 673.3 766 512 766zm-4-430c-97.2 0-176 78.8-176 176s78.8 176 176 176 176-78.8 176-176-78.8-176-176-176zm0 288c-61.9 0-112-50.1-112-112s50.1-112 112-112 112 50.1 112 112-50.1 112-112 112z"/></svg>
            脱敏模式
          </div>
        </div>

        <div class="pro-grid" id="proGrid"></div>

        <div class="pagination" id="pagination"></div>
      </div>

    </div>
  </div>

<!-- 项目跳转选择弹窗 -->
<div id="projectModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:2000;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:8px;width:440px;box-shadow:0 6px 24px rgba(0,0,0,0.2);overflow:hidden;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid #f0f0f0;">
      <span style="font-size:16px;font-weight:500;">选择进入方式</span>
      <span onclick="document.getElementById('projectModal').style.display='none'" style="cursor:pointer;color:rgba(0,0,0,0.45);font-size:18px;line-height:1;">×</span>
    </div>
    <div style="padding:16px 24px 8px;">
      <p style="color:#ff4d4f;font-size:13px;margin-bottom:16px;">⚠ 原型演示效果：实际产品中将根据用户角色自动进入对应端，无需手动选择。</p>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <a href="../frontend-inside-impl/project-overview.html" style="display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid #d9d9d9;border-radius:6px;text-decoration:none;color:rgba(0,0,0,0.85);transition:all 0.2s;" onmouseover="this.style.borderColor='#1890ff';this.style.background='#e6f7ff'" onmouseout="this.style.borderColor='#d9d9d9';this.style.background='#fff'">
          <span style="font-size:22px;">🛠</span>
          <div>
            <div style="font-size:14px;font-weight:500;">实施端 · 中文</div>
            <div style="font-size:12px;color:rgba(0,0,0,0.45);">frontend-inside-impl/project-overview.html</div>
          </div>
        </a>
        <a href="../frontend-inside-cert-cn/project-overview.html" style="display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid #d9d9d9;border-radius:6px;text-decoration:none;color:rgba(0,0,0,0.85);transition:all 0.2s;" onmouseover="this.style.borderColor='#1890ff';this.style.background='#e6f7ff'" onmouseout="this.style.borderColor='#d9d9d9';this.style.background='#fff'">
          <span style="font-size:22px;">🔍</span>
          <div>
            <div style="font-size:14px;font-weight:500;">评测端 · 中文</div>
            <div style="font-size:12px;color:rgba(0,0,0,0.45);">frontend-inside-cert-cn/project-overview.html</div>
          </div>
        </a>

      </div>
    </div>
    <div style="padding:8px 24px 16px;"></div>
  </div>
</div>

<script>
  // ── 项目跳转弹窗 ──────────────────────────────────────
  function openProjectModal() {
    const modal = document.getElementById('projectModal');
    modal.style.display = 'flex';
    modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
  }

  // ── 数据 ──────────────────────────────────────────────
  const ALL_PROJECTS = [
    { name: '市场部演示',           label: '评估保障级（EAL）-2024', tags: ['EAL4'],                          time: '2026-02-11' },
    { name: '太行操作系统V3.2',     label: '评估保障级（EAL）-2024', tags: ['EAL5+'],                         time: '2026-01-26' },
    { name: '比亚迪 TEE',          label: '评估保障级（EAL）-2024', tags: ['EAL4+'],                         time: '2026-01-08' },
    { name: 'test',                label: '评估保障级（EAL）-2024', tags: ['EAL1+', '访问控制'],              time: '2025-12-19' },
    { name: '2025 中国移动云大云天元操作系统 EAL4+认证', label: '评估保障级（EAL）-2024', tags: ['EAL4+', '操作系统'], time: '2025-12-08' },
    { name: '2025 631嵌入式混合关键操作系统hypervisor', label: '评估保障级（EAL）-2024', tags: ['EAL5+', '操作系统'], time: '2025-12-01' },
    { name: '小米可信隔离引擎',     label: '评估保障级（EAL）-2024', tags: ['EAL5+', '操作系统'],             time: '2025-10-15' },
    { name: '陈test',              label: '评估保障级（EAL）-2024', tags: ['EAL5+', '访问控制'],             time: '2025-09-01' },
    { name: '章喆测试',            label: '评估保障级（EAL）-2024', tags: ['EAL5+', '操作系统'],             time: '2025-06-18' },
    { name: '208 昆仑OS',          label: '评估保障级（EAL）-2024', tags: ['EAL5+', '操作系统'],             time: '2025-06-05' },
    { name: 'Test-小米XSPM',       label: '评估保障级（EAL）-2024', tags: ['EAL5+', '其他设备和系统'],       time: '2025-06-04' },
    { name: '测试项目2',           label: '评估保障级（EAL）-2024', tags: ['EAL5', 'IC、智能卡以及智能卡相关'], time: '2025-06-03' },
  ];

  const ARCHIVED = [
    { name: '华为鸿蒙 EAL4 认证项目', label: '评估保障级（EAL）-2017', tags: ['EAL4', '操作系统'], time: '2024-12-01' },
    { name: '某银行 USB Key',         label: '评估保障级（EAL）-2017', tags: ['EAL2', 'IC、智能卡以及智能卡相关'], time: '2024-08-15' },
  ];

  let currentTab = 'underway';
  let filteredData = [...ALL_PROJECTS];
  const PAGE_SIZE = 12;
  let currentPage = 1;

  // ── 渲染卡片 ──────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById('proGrid');
    const start = (currentPage - 1) * PAGE_SIZE;
    const pageData = filteredData.slice(start, start + PAGE_SIZE);

    if (pageData.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:rgba(0,0,0,0.25);font-size:14px;">暂无项目</div>';
    } else {
      grid.innerHTML = pageData.map(p => `
        <div class="pro-wrap" onclick="openProjectModal()">
          <div class="pro-name">${escHtml(p.name)}</div>
          <div class="pro-label">${escHtml(p.label)}</div>
          <div class="pro-foot">${p.tags.map(t => `<span class="tag">${escHtml(t)}</span>`).join('')}</div>
          <div class="create-time">创建日期 ${escHtml(p.time)}</div>
        </div>
      `).join('');
    }

    renderPagination();
  }

  // ── 渲染分页 ──────────────────────────────────────────
  function renderPagination() {
    const total = filteredData.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    const pg = document.getElementById('pagination');

    let html = `<span class="pagination-info">共 ${total} 个项目</span>`;
    html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">‹</button>`;

    for (let i = 1; i <= totalPages; i++) {
      html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }

    html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">›</button>`;
    pg.innerHTML = html;
  }

  function goPage(p) {
    const totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
    if (p < 1 || p > totalPages) return;
    currentPage = p;
    renderGrid();
  }

  // ── Tab 切换 ──────────────────────────────────────────
  function switchTab(el) {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentTab = el.dataset.tab;
    filteredData = currentTab === 'underway' ? [...ALL_PROJECTS] : [...ARCHIVED];
    currentPage = 1;
    renderGrid();
  }

  // ── 筛选 ──────────────────────────────────────────────
  function applyFilter() {
    const name = document.getElementById('filterName').value.trim().toLowerCase();
    const certType = document.getElementById('filterCertType').value;
    const dateStart = document.getElementById('dateStart').value;
    const dateEnd = document.getElementById('dateEnd').value;

    const base = currentTab === 'underway' ? ALL_PROJECTS : ARCHIVED;
    filteredData = base.filter(p => {
      if (name && !p.name.toLowerCase().includes(name)) return false;
      if (certType && p.label !== certType) return false;
      if (dateStart && p.time < dateStart) return false;
      if (dateEnd && p.time > dateEnd) return false;
      return true;
    });

    currentPage = 1;
    renderGrid();
  }

  function resetFilter() {
    document.getElementById('filterName').value = '';
    document.getElementById('filterCertType').value = '';
    document.getElementById('filterLevel').value = '';
    document.getElementById('filterProductType').value = '';
    document.getElementById('dateStart').value = '';
    document.getElementById('dateEnd').value = '';
    filteredData = currentTab === 'underway' ? [...ALL_PROJECTS] : [...ARCHIVED];
    currentPage = 1;
    renderGrid();
  }

  // ── 侧边栏菜单交互 ────────────────────────────────────
  document.querySelectorAll('.menu-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
      item.classList.add('active');
    });
  });

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // 筛选按钮触发也可按回车
  document.getElementById('filterName').addEventListener('keydown', e => { if (e.key === 'Enter') applyFilter(); });

  // 认证类型变化时，联动启用/禁用下级字段并切换 tooltip
  document.getElementById('filterCertType').addEventListener('change', function() {
    const hasValue = this.value !== '';
    const levelWrap = document.getElementById('wrapLevel');
    const productWrap = document.getElementById('wrapProductType');
    const levelSelect = document.getElementById('filterLevel');
    const productSelect = document.getElementById('filterProductType');

    levelSelect.disabled = !hasValue;
    productSelect.disabled = !hasValue;

    if (hasValue) {
      levelWrap.removeAttribute('data-tip');
      productWrap.removeAttribute('data-tip');
    } else {
      levelWrap.setAttribute('data-tip', '请先选择认证类型');
      productWrap.setAttribute('data-tip', '请先选择认证类型');
      levelSelect.value = '';
      productSelect.value = '';
    }
  });

  // ── 通知 dropdown ─────────────────────────────────────
  const NOTIFICATIONS = [
    { id: 1, text: '【太行操作系统V3.2】测评任务"安全功能测试"已完成，请查看结果', time: '10分钟前', read: false },
    { id: 2, text: '【比亚迪 TEE】文档"安全目标（ST）"已提交审核，等待评审员确认', time: '1小时前', read: false },
    { id: 3, text: '【小米可信隔离引擎】评审意见已反馈，请及时处理', time: '3小时前', read: false },
    { id: 4, text: '【市场部演示】项目状态已更新为"进行中"', time: '昨天 16:42', read: false },
    { id: 5, text: '【208 昆仑OS】你被添加为项目成员，角色：测评工程师', time: '昨天 09:15', read: true },
  ];

  let unreadCount = NOTIFICATIONS.filter(n => !n.read).length;

  function renderNotifList() {
    const list = document.getElementById('notifList');
    list.innerHTML = NOTIFICATIONS.map(n => `
      <div class="notif-item ${n.read ? 'read' : ''}" data-id="${n.id}">
        <div class="notif-dot ${n.read ? 'read' : ''}"></div>
        <div class="notif-body">
          <div class="notif-title">${n.text}</div>
          <div class="notif-time">${n.time}</div>
        </div>
      </div>
    `).join('');

    // 点击单条标为已读
    list.querySelectorAll('.notif-item').forEach(el => {
      el.addEventListener('click', () => {
        const item = NOTIFICATIONS.find(n => n.id === +el.dataset.id);
        if (item && !item.read) {
          item.read = true;
          unreadCount--;
          updateBadge();
          renderNotifList();
        }
      });
    });
  }

  function updateBadge() {
    const badge = document.getElementById('bellBadge');
    if (unreadCount > 0) {
      badge.textContent = unreadCount;
      badge.style.display = 'flex';
    } else {
      badge.style.display = 'none';
    }
  }

  // 全部已读
  document.getElementById('markAllRead').addEventListener('click', (e) => {
    e.stopPropagation();
    NOTIFICATIONS.forEach(n => n.read = true);
    unreadCount = 0;
    updateBadge();
    renderNotifList();
  });

  // 开关 dropdown
  document.getElementById('bellWrap').addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById('notifDropdown').classList.toggle('open');
  });

  // 点击外部关��
  document.addEventListener('click', () => {
    document.getElementById('notifDropdown').classList.remove('open');
  });

  renderNotifList();

  // ── 隐私模式 ──────────────────────��───────────────────
  const privacyToggle = document.getElementById('privacyToggle');
  let privacyOn = false;

  function applyPrivacy() {
    document.body.classList.toggle('privacy-mode', privacyOn);
    privacyToggle.classList.toggle('active', privacyOn);
  }

  privacyToggle.addEventListener('click', () => {
    privacyOn = !privacyOn;
    localStorage.setItem('privacyMode', privacyOn ? '1' : '0');
    applyPrivacy();
  });

  applyPrivacy();

  // ── 初始化 ────────────────────────────────────────────
  renderGrid();
  function toggleUserDropdown() {
    document.getElementById('userDropdown').classList.toggle('open');
  }
  document.addEventListener('click', (e) => {
    const wrap = document.querySelector('.user-dropdown-wrap');
    if (wrap && !wrap.contains(e.target)) {
      document.getElementById('userDropdown').classList.remove('open');
    }
  });
</script>
</body>
</html>
