<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Fragment Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f2f5;
      padding: 40px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      color: #333;
      display: flex;
      justify-content: center;
    }

    .fragment-wrapper {
      width: 100%;
      max-width: 860px;
      position: relative;
    }

    .fragment-card {
      background: #fff;
      border: 1px solid #e8eaed;
      border-radius: 6px;
      padding: 16px 20px;
      flex: 1;
      position: relative;
      transition: border-color 0.2s;
    }

    .fragment-card.editing {
      border-color: #1677ff;
    }

    /* 顶部：标题行 */
    .fragment-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 8px;
    }

    .fragment-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #1677ff;
      min-width: 0;
    }

    .fragment-title .copy-icon {
      cursor: pointer;
      color: #1677ff;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .fragment-title .copy-icon:hover { color: #0958d9; }

    /* 右侧按钮区 */
    .fragment-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* 状态标签（绑定/分离） */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #555;
      user-select: none;
      white-space: nowrap;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .status-badge.bound .status-dot  { background: #52c41a; }
    .status-badge.detached .status-dot { background: #faad14; }

    /* 批注触发按钮（划词后显示） */
    .annotate-trigger-btn {
      display: none;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border: 1px solid #1677ff;
      border-radius: 4px;
      background: #fff;
      color: #1677ff;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s;
    }
    .annotate-trigger-btn:hover { background: #e6f4ff; }
    .annotate-trigger-btn.visible { display: flex; }

    /* 悬浮按钮组（编辑、删除） */
    .fragment-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s ease;
      pointer-events: none;
    }

    .fragment-card:hover .fragment-actions {
      opacity: 1;
      pointer-events: auto;
    }

    .fragment-card.editing .fragment-actions {
      opacity: 1;
      pointer-events: auto;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border: none;
      background: transparent;
      color: #555;
      font-size: 13px;
      cursor: pointer;
      border-radius: 4px;
      white-space: nowrap;
      transition: background 0.12s, color 0.12s;
    }

    .action-btn:hover { background: #f0f2f5; color: #1677ff; }
    .action-btn.danger:hover { background: #fff1f0; color: #ff4d4f; }
    .action-btn svg { flex-shrink: 0; }

    /* 更新提示条 */
    .update-banner {
      display: none;
      align-items: center;
      gap: 6px;
      background: #fffbe6;
      border: 1px solid #ffe58f;
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 12px;
      color: #ad6800;
      margin-bottom: 10px;
    }
    .update-banner.visible { display: flex; }

    /* 内容区 */
    .fragment-body {
      user-select: text;
      position: relative;
    }

    .fragment-body.editable-mode {
      cursor: text;
    }

    .field-row {
      display: flex;
      align-items: baseline;
      padding: 5px 0;
      line-height: 1.6;
      position: relative;
    }

    .field-label {
      color: #555;
      flex-shrink: 0;
      min-width: 90px;
    }

    .field-value {
      color: #1a1a1a;
      outline: none;
    }

    /* 富文本编辑态：整块可编辑，无额外视觉提示 */
    .fragment-body[contenteditable="true"] {
      cursor: text;
      outline: none;
    }

    /* 划词批注高亮 */
    .annotation-highlight {
      background: #dbeafe;
      cursor: pointer;
      border-radius: 2px;
    }
    .annotation-highlight:hover {
      background: #bfdbfe;
    }

    .divider {
      border: none;
      border-top: 1px solid #e8eaed;
      margin: 10px 0;
    }

    /* 批注面板 */
    .annotation-panel {
      width: 220px;
      position: absolute;
      left: calc(100% + 12px);
      top: 0;
      display: none;
      flex-direction: column;
    }

    .annotation-panel.visible {
      display: flex;
    }

    /* 批注输入框嵌在面板内 */
    .annotation-input-inline {
      display: none;
      flex-direction: column;
      gap: 0;
      border: 1px solid #e8eaed;
      border-top: none;
      background: #fff;
      padding: 10px 12px;
    }

    .annotation-input-inline.visible {
      display: flex;
    }

    .annotation-input-inline textarea {
      width: 100%;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 13px;
      resize: none;
      height: 64px;
      font-family: inherit;
      outline: none;
    }
    .annotation-input-inline textarea:focus { border-color: #1677ff; }

    .annotation-input-inline .ann-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 6px;
    }

    .annotation-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fafafa;
      border: 1px solid #e8eaed;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 500;
      color: #333;
    }

    .annotation-panel-close {
      cursor: pointer;
      color: #999;
      display: flex;
      align-items: center;
      padding: 2px;
      border-radius: 3px;
      transition: background 0.12s;
    }
    .annotation-panel-close:hover { background: #f0f0f0; color: #333; }

    .annotation-list {
      border: 1px solid #e8eaed;
      border-radius: 0 0 6px 6px;
      background: #fff;
      flex: 1;
      overflow-y: auto;
      max-height: 400px;
    }

    .annotation-item {
      padding: 10px 12px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }
    .annotation-item:last-child { border-bottom: none; }

    .annotation-quote {
      color: #fa8c16;
      font-size: 12px;
      margin-bottom: 4px;
      background: #fff7e6;
      padding: 2px 6px;
      border-radius: 3px;
      word-break: break-all;
    }

    .annotation-text {
      color: #444;
      line-height: 1.5;
    }

    .ann-btn {
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #d9d9d9;
      background: #fff;
      color: #555;
      transition: all 0.12s;
    }
    .ann-btn.primary {
      background: #1677ff;
      border-color: #1677ff;
      color: #fff;
    }
    .ann-btn.primary:hover { background: #0958d9; }
    .ann-btn:hover { background: #f5f5f5; }

    /* 表单模态 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.visible { display: flex; }

    .modal-box {
      background: #fff;
      border-radius: 8px;
      width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      overflow: hidden;
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 500;
      font-size: 15px;
    }

    .modal-close {
      cursor: pointer;
      color: #999;
      display: flex;
      padding: 3px;
      border-radius: 4px;
      transition: background 0.12s;
    }
    .modal-close:hover { background: #f0f0f0; color: #333; }

    .modal-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-row label {
      font-size: 13px;
      color: #555;
    }

    .form-row input {
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      padding: 7px 10px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-row input:focus { border-color: #1677ff; }

    .modal-footer {
      padding: 12px 20px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn {
      padding: 6px 16px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #d9d9d9;
      background: #fff;
      color: #555;
      font-family: inherit;
      transition: all 0.12s;
    }
    .btn.primary { background: #1677ff; border-color: #1677ff; color: #fff; }
    .btn.primary:hover { background: #0958d9; }
    .btn:hover { background: #f5f5f5; }
  </style>
</head>
<body>

<div class="fragment-wrapper">
  <!-- 片段卡片 -->
  <div class="fragment-card" id="fragmentCard">

    <!-- 标题行 -->
    <div class="fragment-header">
      <div class="fragment-title">
        <span class="copy-icon" title="复制">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </span>
        [ST]ST标识和TOE标识(EAL2~EAL7)
      </div>

      <div class="fragment-controls">
        <!-- 划词后出现的批注按钮 -->
        <button class="annotate-trigger-btn" id="annotateTriggerBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          批注
        </button>

        <!-- 悬浮按钮组 -->
        <div class="fragment-actions" id="fragmentActions">
          <button class="action-btn" id="refreshBtn" title="刷新">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"></polyline>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            刷新
          </button>
          <button class="action-btn" id="editBtn" title="编辑">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
            表单
          </button>
          <button class="action-btn danger" title="删除">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
              <path d="M10 11v6"></path>
              <path d="M14 11v6"></path>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
            </svg>
            删除
          </button>
        </div>

        <!-- 状态标签 -->
        <div class="status-badge bound" id="statusBadge">
          <span class="status-dot"></span>
          <span class="status-label">绑定</span>
        </div>
      </div>
    </div>

    <!-- 更新提示条 -->
    <div class="update-banner" id="updateBanner">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      表单内容已更新，刷新后同步
    </div>

    <!-- 内容区 -->
    <div class="fragment-body" id="fragmentBody"></div>
  </div>

  <!-- 批注面板 -->
  <div class="annotation-panel" id="annotationPanel">
    <div class="annotation-panel-header">
      <span>批注</span>
      <span class="annotation-panel-close" id="closeAnnotation">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </span>
    </div>
    <!-- 嵌入输入框 -->
    <div class="annotation-input-inline" id="annotationInputInline">
      <textarea id="annotationTextarea" placeholder="添加批注..."></textarea>
      <div class="ann-actions">
        <button class="ann-btn" id="annCancel">取消</button>
        <button class="ann-btn primary" id="annConfirm">确认</button>
      </div>
    </div>
    <div class="annotation-list" id="annotationList">
      <div style="padding:16px;color:#999;font-size:13px;text-align:center;">暂无批注</div>
    </div>
  </div>
</div>

<!-- 编辑表单模态 -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-header">
      <span>编辑片段</span>
      <span class="modal-close" id="modalClose">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </span>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>ST标题</label>
        <input type="text" id="f-st-title" value="ST标题">
      </div>
      <div class="form-row">
        <label>ST版本</label>
        <input type="text" id="f-st-version" value="D1.0">
      </div>
      <div class="form-row">
        <label>ST作者</label>
        <input type="text" id="f-st-author" value="ST作者">
      </div>
      <div class="form-row">
        <label>ST出版日期</label>
        <input type="text" id="f-st-date" value="2025-07-22">
      </div>
      <div class="form-row">
        <label>TOE名称</label>
        <input type="text" id="f-toe-name" value="望安CaaS平台">
      </div>
      <div class="form-row">
        <label>TOE版本号</label>
        <input type="text" id="f-toe-version" value="V1.0">
      </div>
      <div class="form-row">
        <label>TOE英文名称</label>
        <input type="text" id="f-toe-name-en" value="TEST TOE">
      </div>
      <div class="form-row">
        <label>生产商</label>
        <input type="text" id="f-manufacturer" value="望安科技">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="modalCancel">取消</button>
      <button class="btn primary" id="modalSave">保存</button>
    </div>
  </div>
</div>

<script>
  const card = document.getElementById('fragmentCard');
  const body = document.getElementById('fragmentBody');
  const statusBadge = document.getElementById('statusBadge');
  const statusLabel = statusBadge.querySelector('.status-label');
  const annotateTriggerBtn = document.getElementById('annotateTriggerBtn');
  const updateBanner = document.getElementById('updateBanner');
  const annotationPanel = document.getElementById('annotationPanel');
  const annotationList = document.getElementById('annotationList');
  const annotationInputInline = document.getElementById('annotationInputInline');
  const annotationTextarea = document.getElementById('annotationTextarea');
  const editModal = document.getElementById('editModal');

  let isDetached = false;
  let isEditing = false;
  let annotations = [];
  let annIdCounter = 0;
  let pendingRange = null;
  let pendingText = null;

  // ── 状态标签更新 ──────────────────────────────
  function setDetached(val) {
    isDetached = val;
    if (val) {
      statusBadge.classList.remove('bound');
      statusBadge.classList.add('detached');
      statusLabel.textContent = '分离';
    } else {
      statusBadge.classList.remove('detached');
      statusBadge.classList.add('bound');
      statusLabel.textContent = '绑定';
    }
  }

  // ── 点击内容区进入文本编辑 ────────────────────
  body.addEventListener('click', (e) => {
    if (e.target.closest('.action-btn')) return;
    if (!isEditing) enterTextEdit();
  });

  function enterTextEdit() {
    isEditing = true;
    card.classList.add('editing');
    body.setAttribute('contenteditable', 'true');
    if (!isDetached) setDetached(true);
  }

  function exitTextEdit() {
    isEditing = false;
    card.classList.remove('editing');
    body.removeAttribute('contenteditable');
  }

  // ── 表单数据 ──────────────────────────────────
  let formData = {
    'st-title':    'ST标题',
    'st-version':  'D1.0',
    'st-author':   'ST作者',
    'st-date':     '2025-07-22',
    'toe-name':    '望安CaaS平台',
    'toe-version': 'V1.0',
    'toe-name-en': 'TEST TOE',
    'manufacturer':'望安科技',
  };

  function renderContent(data) {
    body.innerHTML = `
      <div class="field-row"><span class="field-label">ST标题：</span><span class="field-value">${data['st-title']}</span></div>
      <div class="field-row"><span class="field-label">ST版本：</span><span class="field-value">${data['st-version']}</span></div>
      <div class="field-row"><span class="field-label">ST作者：</span><span class="field-value">${data['st-author']}</span></div>
      <div class="field-row"><span class="field-label">ST出版日期：</span><span class="field-value">${data['st-date']}</span></div>
      <hr class="divider">
      <div class="field-row"><span class="field-label">TOE名称：</span><span class="field-value">${data['toe-name']}</span></div>
      <div class="field-row"><span class="field-label">TOE版本号：</span><span class="field-value">${data['toe-version']}</span></div>
      <div class="field-row"><span class="field-label">TOE英文名称：</span><span class="field-value">${data['toe-name-en']}</span></div>
      <div class="field-row"><span class="field-label">生产商：</span><span class="field-value">${data['manufacturer']}</span></div>
    `;
  }

  // 点击卡片外部退出文本编辑
  document.addEventListener('click', (e) => {
    if (!card.contains(e.target) && !annotationPanel.contains(e.target)) {
      if (isEditing) exitTextEdit();
      // 隐藏批注触发按钮（若点击了外部非批注区域）
      if (!annotationPanel.contains(e.target)) {
        annotateTriggerBtn.classList.remove('visible');
        pendingRange = null;
        pendingText = null;
      }
    }
  });

  // ── 划词 → 右上角出现批注按钮 ────────────────
  body.addEventListener('mouseup', () => {
    // 稍等一帧确保 selection 已稳定
    setTimeout(() => {
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed) {
        annotateTriggerBtn.classList.remove('visible');
        pendingRange = null;
        pendingText = null;
        return;
      }
      const text = sel.toString().trim();
      if (!text) {
        annotateTriggerBtn.classList.remove('visible');
        return;
      }
      pendingRange = sel.getRangeAt(0).cloneRange();
      pendingText = text;
      annotateTriggerBtn.classList.add('visible');
    }, 0);
  });

  // ── 点击批注按钮 → 打开右侧面板+输入框 ───────
  annotateTriggerBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!pendingRange) return;
    // 打开批注面板
    annotationPanel.classList.add('visible');
    // 展开嵌入输入框
    annotationInputInline.classList.add('visible');
    annotationTextarea.value = '';
    annotationTextarea.focus();
    // 隐藏触发按钮
    annotateTriggerBtn.classList.remove('visible');
  });

  // ── 批注确认/取消 ──────────────────────────────
  document.getElementById('annCancel').addEventListener('click', () => {
    annotationInputInline.classList.remove('visible');
    pendingRange = null;
    pendingText = null;
    window.getSelection()?.removeAllRanges();
  });

  document.getElementById('annConfirm').addEventListener('click', () => {
    const note = annotationTextarea.value.trim();
    if (!note || !pendingRange) {
      annotationInputInline.classList.remove('visible');
      return;
    }
    // 高亮选区（用 extractContents+insertNode，比 surroundContents 更健壮）
    const id = 'ann-' + (annIdCounter++);
    try {
      const mark = document.createElement('mark');
      mark.className = 'annotation-highlight';
      mark.dataset.annId = id;
      const frag = pendingRange.extractContents();
      mark.appendChild(frag);
      pendingRange.insertNode(mark);
    } catch (err) {
      // 极端跨节点情况忽略高亮，批注仍保存
    }

    annotations.push({ id, quote: pendingText, text: note });
    renderAnnotations();

    // 状态切换为分离
    setDetached(true);

    annotationInputInline.classList.remove('visible');
    pendingRange = null;
    pendingText = null;
    window.getSelection()?.removeAllRanges();
  });

  function renderAnnotations() {
    if (annotations.length === 0) {
      annotationList.innerHTML = '<div style="padding:16px;color:#999;font-size:13px;text-align:center;">暂无批注</div>';
      return;
    }
    annotationList.innerHTML = annotations.map((a) => `
      <div class="annotation-item">
        <div class="annotation-quote" style="display:flex;align-items:flex-start;justify-content:space-between;gap:4px;">
          <span>"${a.quote}"</span>
          <span class="ann-delete-btn" data-ann-id="${a.id}" title="删除批注" style="cursor:pointer;color:#bbb;flex-shrink:0;padding:1px 2px;border-radius:3px;line-height:1;" onmouseenter="this.style.color='#ff4d4f'" onmouseleave="this.style.color='#bbb'">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </span>
        </div>
        <div class="annotation-text">${a.text}</div>
      </div>
    `).join('');

    annotationList.querySelectorAll('.ann-delete-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteAnnotation(btn.dataset.annId));
    });
  }

  function deleteAnnotation(id) {
    const mark = body.querySelector(`mark[data-ann-id="${id}"]`);
    if (mark) {
      const parent = mark.parentNode;
      while (mark.firstChild) parent.insertBefore(mark.firstChild, mark);
      parent.removeChild(mark);
      parent.normalize();
    }
    annotations = annotations.filter(a => a.id !== id);
    renderAnnotations();
  }

  document.getElementById('closeAnnotation').addEventListener('click', () => {
    annotationPanel.classList.remove('visible');
  });

  // ── 刷新按钮 → 用 formData 重新渲染 ─────────
  document.getElementById('refreshBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    renderContent(formData);
    setDetached(false);
    exitTextEdit();
    updateBanner.classList.remove('visible');
    annotations = [];
    renderAnnotations();
  });

  // ── 编辑按钮 → 打开表单 ───────────────────────
  document.getElementById('editBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById('f-st-title').value    = formData['st-title'];
    document.getElementById('f-st-version').value  = formData['st-version'];
    document.getElementById('f-st-author').value   = formData['st-author'];
    document.getElementById('f-st-date').value     = formData['st-date'];
    document.getElementById('f-toe-name').value    = formData['toe-name'];
    document.getElementById('f-toe-version').value = formData['toe-version'];
    document.getElementById('f-toe-name-en').value = formData['toe-name-en'];
    document.getElementById('f-manufacturer').value= formData['manufacturer'];
    editModal.classList.add('visible');
  });

  document.getElementById('modalClose').addEventListener('click', () => editModal.classList.remove('visible'));
  document.getElementById('modalCancel').addEventListener('click', () => editModal.classList.remove('visible'));

  document.getElementById('modalSave').addEventListener('click', () => {
    formData['st-title']    = document.getElementById('f-st-title').value;
    formData['st-version']  = document.getElementById('f-st-version').value;
    formData['st-author']   = document.getElementById('f-st-author').value;
    formData['st-date']     = document.getElementById('f-st-date').value;
    formData['toe-name']    = document.getElementById('f-toe-name').value;
    formData['toe-version'] = document.getElementById('f-toe-version').value;
    formData['toe-name-en'] = document.getElementById('f-toe-name-en').value;
    formData['manufacturer']= document.getElementById('f-manufacturer').value;
    editModal.classList.remove('visible');
    if (isDetached) {
      updateBanner.classList.add('visible');
    } else {
      renderContent(formData);
    }
  });

  editModal.addEventListener('click', (e) => {
    if (e.target === editModal) editModal.classList.remove('visible');
  });

  // 初始渲染
  renderContent(formData);
</script>
</body>
</html>
