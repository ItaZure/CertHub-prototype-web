<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Denied - CertHub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-size: 14px;
      color: rgba(0,0,0,0.85);
      background: #f5fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      height: 50px;
      background: #fff;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-size: 16px;
      font-weight: 700;
      color: #1890ff;
      letter-spacing: 0.5px;
    }

    .divider {
      width: 1px;
      height: 18px;
      background: #e8e8e8;
    }

    .project-label {
      font-size: 14px;
      color: rgba(0,0,0,0.45);
    }

    .user-agency {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #1890ff;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .error-card {
      background: #fff;
      border-radius: 12px;
      padding: 64px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .error-illustration {
      width: 120px;
      height: 120px;
      margin-bottom: 32px;
      position: relative;
    }

    .error-code {
      font-size: 56px;
      font-weight: 700;
      color: #f0f0f0;
      line-height: 1;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      letter-spacing: -2px;
      z-index: 0;
      user-select: none;
    }

    .error-icon {
      position: relative;
      z-index: 1;
    }

    .error-title {
      font-size: 20px;
      font-weight: 600;
      color: rgba(0,0,0,0.85);
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .error-desc {
      font-size: 14px;
      color: rgba(0,0,0,0.45);
      margin-bottom: 36px;
      line-height: 1.8;
    }

    .btn-group {
      display: flex;
      gap: 12px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 36px;
      padding: 0 20px;
      background: #1890ff;
      color: #fff;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }
    .btn-primary:hover { background: #40a9ff; }
    .btn-primary svg { flex-shrink: 0; }

    .btn-default {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 36px;
      padding: 0 20px;
      background: #fff;
      color: rgba(0,0,0,0.65);
      font-size: 14px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-default:hover { color: #1890ff; border-color: #1890ff; }

    .error-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: rgba(0,0,0,0.25);
      margin-top: 28px;
    }
  </style>
</head>
<body>

  <!-- Top navigation bar -->
  <header class="top-bar">
    <div class="top-bar-left">
      <span class="logo">CertHub</span>
      <div class="divider"></div>
      <span class="project-label">Some Cert Project / Document List</span>
    </div>
    <div class="user-agency">张</div>
  </header>

  <!-- Main content -->
  <main class="main">
    <div class="error-card">

      <!-- Illustration -->
      <div class="error-illustration">
        <span class="error-code">403</span>
        <div class="error-icon">
          <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Background circle -->
            <circle cx="60" cy="60" r="54" fill="#fff5e6" stroke="#ffd591" stroke-width="1.5"/>
            <!-- Document -->
            <rect x="38" y="28" width="44" height="56" rx="3" fill="#fff7e6" stroke="#fa8c16" stroke-width="2"/>
            <path d="M47 42 L73 42" stroke="#ffd591" stroke-width="2" stroke-linecap="round"/>
            <path d="M47 50 L73 50" stroke="#ffd591" stroke-width="2" stroke-linecap="round"/>
            <path d="M47 58 L63 58" stroke="#ffd591" stroke-width="2" stroke-linecap="round"/>
            <!-- Lock icon overlay -->
            <circle cx="76" cy="76" r="16" fill="#fff7e6" stroke="#fa8c16" stroke-width="2"/>
            <rect x="70" y="74" width="12" height="9" rx="1.5" fill="#fa8c16"/>
            <path d="M72 74 L72 71 A4 4 0 0 1 80 71 L80 74" fill="none" stroke="#fa8c16" stroke-width="1.8" stroke-linecap="round"/>
            <circle cx="76" cy="78" r="1.2" fill="#fff"/>
          </svg>
        </div>
      </div>

      <h1 class="error-title">Access Denied</h1>
      <p class="error-desc">You do not have permission to access this document<br>Please contact the project admin for access</p>

      <div class="btn-group">
        <a href="#" class="btn-primary">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M8.5 3L5 7l3.5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Back to Document List
        </a>
      </div>

      <span class="error-badge">Error 403 · Forbidden</span>
    </div>
  </main>

</body>
</html>
