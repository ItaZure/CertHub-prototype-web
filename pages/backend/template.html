<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文档模板 - CertHub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "PingFang SC","Microsoft YaHei",sans-serif; font-size: 14px; color: rgba(0,0,0,0.85); background: #f0f2f5; height: 100vh; overflow: hidden; display: flex; }

    /* Sidebar */
    .sidebar { width: 208px; flex-shrink: 0; background: #fff; height: 100vh; display: flex; flex-direction: column; border-right: 1px solid #f0f0f0; }
    .sidebar-logo { height: 50px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #f0f0f0; font-weight: 700; font-size: 16px; color: #1890ff; }
    .sidebar-menu { padding: 12px 0; flex: 1; }
    .menu-item { display: flex; align-items: center; gap: 8px; height: 40px; padding: 0 16px 0 20px; border-radius: 8px; margin: 0 4px 2px; cursor: pointer; color: rgba(0,0,0,0.65); transition: all 0.2s; }
    .menu-item:hover { background: #f5f5f5; color: rgba(0,0,0,0.85); }
    .menu-item.active { background: #e6f7ff; color: #1890ff; }
    .menu-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .menu-item svg { flex-shrink: 0; width: 16px; height: 16px; }

    /* Main */
    .main-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .header { height: 50px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; }
    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 14px; color: rgba(0,0,0,0.45); }
    .breadcrumb .current { color: rgba(0,0,0,0.85); }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: #1890ff; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; }

    .content { flex: 1; overflow-y: auto; padding: 20px 24px; }

    /* Search */
    .search-container { background: #fff; border-radius: 8px; padding: 20px 24px 8px; margin-bottom: 16px; }
    .filter-row { display: flex; gap: 24px; margin-bottom: 16px; align-items: flex-end; }
    .filter-item { flex: 1; }
    .filter-item label { display: block; margin-bottom: 6px; color: rgba(0,0,0,0.85); text-align: right; padding-right: 8px; width: 100px; float: left; line-height: 32px; }
    .filter-field { margin-left: 108px; }
    .filter-field input, .filter-field select { width: 100%; height: 32px; border: 1px solid #d9d9d9; border-radius: 6px; padding: 0 11px; font-size: 14px; outline: none; color: rgba(0,0,0,0.85); background: #fff; }
    .filter-field input:focus, .filter-field select:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }
    .btn-row { display: flex; gap: 8px; align-items: center; margin-left: 108px; }

    /* Content container */
    .content-container { background: #fff; border-radius: 8px; padding: 16px 24px; }
    .header-wrap { margin-bottom: 16px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 4px; height: 32px; padding: 0 15px; border-radius: 6px; font-size: 14px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
    .btn-primary { background: #1890ff; color: #fff; border-color: #1890ff; }
    .btn-primary:hover { background: #40a9ff; border-color: #40a9ff; }
    .btn-default { background: #fff; color: rgba(0,0,0,0.85); border-color: #d9d9d9; }
    .btn-default:hover { color: #1890ff; border-color: #1890ff; }
    .btn-ghost { background: transparent; color: #1890ff; border-color: #1890ff; }
    .btn-ghost:hover { background: #e6f7ff; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    thead th { background: #fafafa; padding: 12px 16px; text-align: left; font-weight: 500; color: rgba(0,0,0,0.85); border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
    tbody td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; color: rgba(0,0,0,0.85); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafafa; }

    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .status-published { background: #1890ff; }
    .status-unpublished { background: #d9d9d9; }

    .action-link { color: #1890ff; cursor: pointer; margin-right: 8px; font-size: 14px; }
    .action-link:hover { color: #40a9ff; }
    .action-link.danger { color: #ff4d4f; }
    .action-link.danger:hover { color: #ff7875; }

    .ellipsis { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 360px; display: block; }

    /* Pagination */
    .pagination { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 16px; }
    .page-btn { width: 32px; height: 32px; border: 1px solid #d9d9d9; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #fff; font-size: 13px; color: rgba(0,0,0,0.85); }
    .page-btn:hover, .page-btn.active { border-color: #1890ff; color: #1890ff; }
    .page-info { font-size: 13px; color: rgba(0,0,0,0.45); }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 8px; width: 520px; box-shadow: 0 6px 24px rgba(0,0,0,0.2); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #f0f0f0; font-size: 16px; font-weight: 500; }
    .modal-close { cursor: pointer; color: rgba(0,0,0,0.45); font-size: 18px; line-height: 1; }
    .modal-close:hover { color: rgba(0,0,0,0.85); }
    .modal-body { padding: 24px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 24px; border-top: 1px solid #f0f0f0; }
    .form-row { display: flex; align-items: center; margin-bottom: 20px; }
    .form-label { width: 80px; text-align: right; padding-right: 8px; color: rgba(0,0,0,0.85); flex-shrink: 0; }
    .form-label.required::before { content: '*'; color: #f5222d; margin-right: 4px; }
    .form-control { flex: 1; height: 32px; border: 1px solid #d9d9d9; border-radius: 6px; padding: 0 11px; font-size: 14px; outline: none; }
    .form-control:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }

    /* Delete modal */
    .delete-content { display: block; margin: 8px 0 24px; color: rgba(0,0,0,0.45); }
  </style>
</head>
<body>
<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-logo">CertHub 后台</div>
  <div class="sidebar-menu">
    <div class="menu-item active" onclick="location.href='template.html'">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h12v2H2V2zm0 4h12v2H2V6zm0 4h8v2H2v-2z"/></svg>
      文档模板
    </div>
    <div class="menu-item" onclick="location.href='profile.html'">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 2a5 5 0 110 10A5 5 0 018 3zm0 2a3 3 0 100 6 3 3 0 000-6z"/></svg>
      保护轮廓(PP)
    </div>
    <div class="menu-item" onclick="location.href='acronym.html'">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 3h14v2H1V3zm2 4h10v2H3V7zm2 4h6v2H5v-2z"/></svg>
      缩略语
    </div>
  </div>
</div>

<!-- Main -->
<div class="main-wrap">
  <div class="header">
    <div class="breadcrumb">
      <span>后台管理</span>
      <span>/</span>
      <span class="current">文档模板</span>
    </div>
    <div class="user-avatar">管</div>
  </div>

  <div class="content">
    <!-- 搜索区 -->
    <div class="search-container">
      <div class="filter-row">
        <div class="filter-item">
          <label>模板标题</label>
          <div class="filter-field"><input type="text" id="filterName" placeholder="" maxlength="100" /></div>
        </div>
        <div class="filter-item">
          <label>认证类型</label>
          <div class="filter-field">
            <select id="filterCategory">
              <option value="">全部</option>
              <option>CC认证</option>
              <option>等保认证</option>
              <option>密评认证</option>
            </select>
          </div>
        </div>
        <div class="filter-item">
          <label>排版规范</label>
          <div class="filter-field">
            <select id="filterLayout">
              <option value="">全部</option>
              <option>标准版</option>
              <option>简洁版</option>
            </select>
          </div>
        </div>
      </div>
      <div class="filter-row">
        <div class="filter-item">
          <label>状态</label>
          <div class="filter-field">
            <select id="filterStatus">
              <option value="">全部</option>
              <option value="0">未发布</option>
              <option value="1">已发布</option>
            </select>
          </div>
        </div>
        <div class="filter-item" style="flex:2">
          <div class="btn-row">
            <button class="btn btn-ghost" onclick="doFilter()">筛选</button>
            <button class="btn btn-default" onclick="doReset()">重置</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 表格区 -->
    <div class="content-container">
      <div class="header-wrap">
        <button class="btn btn-primary" onclick="openCreateModal()">+ 创建模板</button>
      </div>
      <table id="templateTable">
        <thead>
          <tr>
            <th>模板标题</th>
            <th>认证类型</th>
            <th>排版规范</th>
            <th>上次更新时间</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="pagination">
        <div class="page-btn" onclick="changePage(-1)">‹</div>
        <div class="page-btn active" id="pageNum">1</div>
        <div class="page-btn" onclick="changePage(1)">›</div>
        <div class="page-info" id="pageInfo">共 5 条</div>
      </div>
    </div>
  </div>
</div>

<!-- 创建/编辑模板 Modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <div class="modal-header">
      <span id="modalTitle">创建模板</span>
      <span class="modal-close" onclick="closeModal('createModal')">✕</span>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <span class="form-label required">模板名称</span>
        <input class="form-control" id="formName" placeholder="请输入模板名称" maxlength="100" />
      </div>
      <div class="form-row">
        <span class="form-label required">认证类型</span>
        <select class="form-control" id="formCategory">
          <option value="">请选择</option>
          <option>CC认证</option>
          <option>等保认证</option>
          <option>密评认证</option>
        </select>
      </div>
      <div class="form-row">
        <span class="form-label">排版规范</span>
        <select class="form-control" id="formLayout">
          <option value="">请选择</option>
          <option>标准版</option>
          <option>简洁版</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal('createModal')">取消</button>
      <button class="btn btn-primary" onclick="confirmCreate()">确定</button>
    </div>
  </div>
</div>

<!-- 删除确认 Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-header">
      <span>删除模板</span>
      <span class="modal-close" onclick="closeModal('deleteModal')">✕</span>
    </div>
    <div class="modal-body">
      <span class="delete-content" id="deleteMsg"></span>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal('deleteModal')">取消</button>
      <button class="btn btn-primary" style="background:#ff4d4f;border-color:#ff4d4f" onclick="confirmDelete()">确定</button>
    </div>
  </div>
</div>

<!-- 发布/撤回确认 Modal -->
<div class="modal-overlay" id="publishModal">
  <div class="modal">
    <div class="modal-header">
      <span id="publishModalTitle">发布模板</span>
      <span class="modal-close" onclick="closeModal('publishModal')">✕</span>
    </div>
    <div class="modal-body">
      <span class="delete-content">模板发布后，用户可在创建项目文档时选择该模板</span>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal('publishModal')">取消</button>
      <button class="btn btn-primary" onclick="confirmPublish()">确定</button>
    </div>
  </div>
</div>

<script>
  const mockData = [
    { id: 1, name: 'CC EAL4 标准文档模板', category: 'CC认证', layout: '标准版', updateTime: '2024-03-15 10:30', state: 1 },
    { id: 2, name: '等保三级评估报告模板', category: '等保认证', layout: '简洁版', updateTime: '2024-03-10 14:20', state: 0 },
    { id: 3, name: '密评基础模板', category: '密评认证', layout: '标准版', updateTime: '2024-02-28 09:15', state: 1 },
    { id: 4, name: 'CC EAL2 简化模板', category: 'CC认证', layout: '简洁版', updateTime: '2024-02-20 16:45', state: 0 },
    { id: 5, name: '等保二级合规模板', category: '等保认证', layout: '标准版', updateTime: '2024-01-18 11:00', state: 1 },
  ];

  let filteredData = [...mockData];
  let deleteTargetId = null;
  let publishTargetId = null;
  let editTargetId = null;

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    if (filteredData.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:rgba(0,0,0,0.45)">暂无数据</td></tr>';
      return;
    }
    tbody.innerHTML = filteredData.map(row => `
      <tr>
        <td><span class="ellipsis" title="${row.name}">${row.name}</span></td>
        <td>${row.category}</td>
        <td>${row.layout}</td>
        <td>${row.updateTime}</td>
        <td><span class="status-dot ${row.state ? 'status-published' : 'status-unpublished'}"></span>${row.state ? '已发布' : '未发布'}</td>
        <td>
          <span class="action-link" onclick="enterTemplate(${row.id})">进入</span>
          <span class="action-link" onclick="openPublishModal(${row.id}, ${row.state})">${row.state ? '撤回' : '发布'}</span>
          <span class="action-link danger" onclick="openDeleteModal(${row.id}, '${row.name}')">删除</span>
        </td>
      </tr>
    `).join('');
    document.getElementById('pageInfo').textContent = `共 ${filteredData.length} 条`;
  }

  function doFilter() {
    const name = document.getElementById('filterName').value.trim().toLowerCase();
    const cat = document.getElementById('filterCategory').value;
    const layout = document.getElementById('filterLayout').value;
    const status = document.getElementById('filterStatus').value;
    filteredData = mockData.filter(r => {
      if (name && !r.name.toLowerCase().includes(name)) return false;
      if (cat && r.category !== cat) return false;
      if (layout && r.layout !== layout) return false;
      if (status !== '' && String(r.state) !== status) return false;
      return true;
    });
    renderTable();
  }

  function doReset() {
    document.getElementById('filterName').value = '';
    document.getElementById('filterCategory').value = '';
    document.getElementById('filterLayout').value = '';
    document.getElementById('filterStatus').value = '';
    filteredData = [...mockData];
    renderTable();
  }

  function openCreateModal() {
    editTargetId = null;
    document.getElementById('modalTitle').textContent = '创建模板';
    document.getElementById('formName').value = '';
    document.getElementById('formCategory').value = '';
    document.getElementById('formLayout').value = '';
    document.getElementById('createModal').classList.add('open');
  }

  function confirmCreate() {
    const name = document.getElementById('formName').value.trim();
    const cat = document.getElementById('formCategory').value;
    if (!name || !cat) { alert('请填写必填项'); return; }
    if (editTargetId) {
      const item = mockData.find(r => r.id === editTargetId);
      if (item) { item.name = name; item.category = cat; item.layout = document.getElementById('formLayout').value; item.updateTime = new Date().toLocaleString('zh-CN').replace(/\//g, '-'); }
    } else {
      mockData.unshift({ id: Date.now(), name, category: cat, layout: document.getElementById('formLayout').value, updateTime: new Date().toLocaleString('zh-CN').replace(/\//g, '-'), state: 0 });
    }
    filteredData = [...mockData];
    renderTable();
    closeModal('createModal');
  }

  function openDeleteModal(id, name) {
    deleteTargetId = id;
    document.getElementById('deleteMsg').textContent = `确定要删除模板"${name}"吗?`;
    document.getElementById('deleteModal').classList.add('open');
  }

  function confirmDelete() {
    const idx = mockData.findIndex(r => r.id === deleteTargetId);
    if (idx > -1) mockData.splice(idx, 1);
    filteredData = [...mockData];
    renderTable();
    closeModal('deleteModal');
  }

  function openPublishModal(id, state) {
    publishTargetId = id;
    document.getElementById('publishModalTitle').textContent = state ? '撤回模板' : '发布模板';
    document.getElementById('publishModal').classList.add('open');
  }

  function confirmPublish() {
    const item = mockData.find(r => r.id === publishTargetId);
    if (item) item.state = item.state ? 0 : 1;
    filteredData = [...mockData];
    renderTable();
    closeModal('publishModal');
  }

  function enterTemplate(id) { alert(`进入模板 ${id} 编辑页`); }

  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function changePage(dir) {}

  renderTable();
</script>
</body>
</html>
