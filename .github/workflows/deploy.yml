name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and pull
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.0.173
          username: wonsec
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/wonsec/CertHub-prototype-web
            git pull origin main
