name: Deploy to test server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.0.173
          username: wonsec
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            cd /home/wonsec/CertHub-prototype-web
            git pull origin main
